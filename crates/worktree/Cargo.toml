[package]
name = "worktree"
version.workspace = true
license.workspace = true
authors.workspace = true
edition.workspace = true
publish.workspace = true

[lints]
workspace = true

[lib]
name = "worktree"
path = "src/worktree.rs"

[[test]]
name = "worktree_tests"
path = "tests/integration/worktree_tests.rs"

[features]
test-support = []

[dependencies]
anyhow = { workspace = true }
