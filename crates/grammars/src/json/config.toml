name = "JSON"
grammar = "json"
path_suffixes = ["json"]
line_comments = ["// "]
autoclose_before = ",]}"
brackets = [
  { start = "{", end = "}", close = true, surround = true, newline = true },
  { start = "[", end = "]", close = true, surround = true, newline = true },
  { start = "(", end = ")", close = true, surround = true, newline = false },
  { start = "\"", end = "\"", close = true, surround = true, newline = false, not_in = [
    "string",
  ] },
]
tab_size = 2
debuggers = ["JavaScript"]
word_characters = ["#"]

[overrides.string]
completion_query_characters = [":", " ", "."]
