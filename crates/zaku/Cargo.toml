[package]
name = "zaku"
version.workspace = true
license.workspace = true
repository.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true

[package.metadata.bundle]
name = "Zaku"
description = "Fast, open-source API client with fangs."
version = "Unreleased"
repository = "https://github.com/buildzaku/zaku"
identifier = "dev.zaku.Zaku"
icon = ["resources/app-icon.png", "resources/app-icon@2x.png"]

[lib]
name = "zaku"
path = "src/zaku.rs"

[lints]
workspace = true

[[test]]
name = "keymap_tests"
path = "tests/integration/keymap_tests.rs"

[[test]]
name = "workspace_tests"
path = "tests/integration/workspace_tests.rs"

[features]
default = ["mimalloc"]
mimalloc = ["dep:mimalloc"]

[dependencies]
actions = { workspace = true }
anyhow = { workspace = true }
assets = { workspace = true }
command_palette = { workspace = true }
db = { workspace = true }
editor = { workspace = true }
fs = { workspace = true }
futures = { workspace = true }
gpui = { workspace = true }
gpui_platform = { workspace = true, features = ["font-kit"] }
icons = { workspace = true }
indoc = { workspace = true }
language = { workspace = true }
languages = { workspace = true }
log = { workspace = true }
logger = { workspace = true }
metadata = { workspace = true }
mimalloc = { workspace = true, optional = true }
multi_buffer = { workspace = true }
path = { workspace = true }
project_panel = { workspace = true }
request_editor = { workspace = true }
reqwest_client = { workspace = true }
response_panel = { workspace = true }
session = { workspace = true }
settings = { workspace = true }
system_specs = { workspace = true }
theme = { workspace = true }
theme_settings = { workspace = true }
title_bar = { workspace = true }
ui = { workspace = true }
uuid = { workspace = true }
workspace = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
ashpd = { workspace = true }
gpui_platform = { workspace = true, features = [
  "screen-capture",
  "wayland",
  "x11",
] }

[dev-dependencies]
fs = { workspace = true, features = ["test"] }
gpui = { workspace = true, features = ["test-support"] }
http_client = { workspace = true, features = ["test"] }
parking_lot = { workspace = true }
path = { workspace = true, features = ["test"] }
project = { workspace = true, features = ["test"] }
response_panel = { workspace = true, features = ["test"] }
serde_json = { workspace = true }
workspace = { workspace = true, features = ["test"] }
worktree = { workspace = true, features = ["test"] }
