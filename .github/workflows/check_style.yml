name: "Check Style"

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name == 'main' && github.sha || github.head_ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check_style:
    name: "Check Style"
    if: github.repository == 'buildzaku/zaku'
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Check shell scripts"
        run: ./script/check --verbose
        shell: bash

      - name: "Install PSScriptAnalyzer"
        run: Install-PSResource -Name PSScriptAnalyzer -Version 1.25.0 -Scope CurrentUser -TrustRepository -Reinstall
        shell: pwsh

      - name: "Check PowerShell scripts"
        run: pwsh -File ./script/check.ps1 -Verbose

      - name: "Setup pnpm"
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.33.2

      - name: "Install shfmt"
        env:
          SHFMT_VERSION: 3.13.1
          SHFMT_SHA256: fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1
        run: |
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o "${RUNNER_TEMP}/shfmt"
          printf '%s  %s\n' "${SHFMT_SHA256}" "${RUNNER_TEMP}/shfmt" | sha256sum --check
          chmod +x "${RUNNER_TEMP}/shfmt"
          echo "${RUNNER_TEMP}" >>"${GITHUB_PATH}"
        shell: bash

      - name: "Check formatting"
        run: ./script/fmt --check
        shell: bash

      - name: "Check for typos"
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1
