name: "Run Tests"

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name == 'main' && github.sha || github.head_ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  run_tests_linux_arm64:
    name: "Test Linux ARM64"
    if: github.repository == 'buildzaku/zaku'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Cargo config"
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/workflow-config.toml ./../.cargo/config.toml
        shell: bash

      - name: "Install Linux dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libfontconfig-dev \
            libasound2-dev \
            libssl-dev

      - name: "Setup Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false
          cache-targets: false
          shared-key: linux-arm64

      - name: "Install Nextest"
        uses: taiki-e/install-action@e537394e10461340f56469a03c3e73f1705074a9 # nextest

      - name: "Setup sccache"
        run: ./script/setup-sccache
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_SCCACHE_BUCKET: ${{ secrets.R2_SCCACHE_BUCKET }}

      - name: "Run tests"
        run: cargo nextest run --workspace --no-fail-fast

      - name: "Show sccache stats"
        run: sccache --show-stats
        shell: bash

  run_tests_linux_x86_64:
    name: "Test Linux x86_64"
    if: github.repository == 'buildzaku/zaku'
    runs-on: ubuntu-24.04
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Cargo config"
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/workflow-config.toml ./../.cargo/config.toml
        shell: bash

      - name: "Install Linux dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libfontconfig-dev \
            libasound2-dev \
            libssl-dev

      - name: "Setup Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false
          cache-targets: false
          shared-key: linux-x86_64

      - name: "Install Nextest"
        uses: taiki-e/install-action@e537394e10461340f56469a03c3e73f1705074a9 # nextest

      - name: "Setup sccache"
        run: ./script/setup-sccache
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_SCCACHE_BUCKET: ${{ secrets.R2_SCCACHE_BUCKET }}

      - name: "Run tests"
        run: cargo nextest run --workspace --no-fail-fast

      - name: "Show sccache stats"
        run: sccache --show-stats
        shell: bash

  run_tests_macos_arm64:
    name: "Test macOS ARM64"
    if: github.repository == 'buildzaku/zaku'
    runs-on: macos-26
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Setup Cargo config"
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/workflow-config.toml ./../.cargo/config.toml
        shell: bash

      - name: "Setup Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: false
          cache-targets: false
          shared-key: macos-arm64

      - name: "Install Nextest"
        uses: taiki-e/install-action@e537394e10461340f56469a03c3e73f1705074a9 # nextest

      - name: "Setup sccache"
        run: ./script/setup-sccache
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
